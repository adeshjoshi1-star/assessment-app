<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="app-layout">
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-header">
        <i class="fas fa-clipboard-list"></i> AssessPro
      </div>
      <nav class="sidebar-nav">
        <a href="form.html"><i class="fas fa-edit"></i> New Assessment</a>
        <a href="dashboard.html" class="active"><i class="fas fa-list"></i> Submissions</a>
        <a href="analytics.html"><i class="fas fa-chart-pie"></i> Analytics</a>
      </nav>
      <div class="sidebar-footer">
        <a href="#" id="logoutLink"><i class="fas fa-sign-out-alt"></i> Logout</a>
      </div>
    </aside>

    <div class="main-area">
      <header class="topbar">
        <button class="hamburger" id="hamburger"><i class="fas fa-bars"></i></button>
        <span class="topbar-title">Dashboard</span>
        <div class="topbar-right">
          <span class="topbar-user" id="userName"></span>
        </div>
      </header>

      <div class="content-area">
        <div class="page-header">
          <h1>Demo Tracking</h1>
          <p>Auto-refreshes every 30s. <span id="sheetSyncInfo"></span></p>
        </div>
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>Student Name</th>
                <th>Age</th>
                <th>Language</th>
                <th>Slot</th>
                <th>Demo Status</th>
                <th>Status</th>
                <th>Date</th>
                <th>Time</th>
                <th>Tutor</th>
                <th>Agent</th>
                <th>Phone</th>
              </tr>
            </thead>
            <tbody id="sheetTableBody"></tbody>
          </table>
        </div>
      </div>
    </div>
  </div>

  <script>
    // Check auth
    (async () => {
      try {
        const res = await fetch('/api/me');
        const data = await res.json();
        if (!data.authenticated) {
          window.location.href = 'login.html';
          return;
        }
        document.getElementById('userName').textContent = data.name;
      } catch {
        window.location.href = 'login.html';
      }
    })();

    document.getElementById('sheetTableBody').addEventListener('change', async (e) => {
      if (!e.target.classList.contains('sheet-status-select')) return;
      const row = e.target.dataset.row;
      const status = e.target.value;
      try {
        await fetch('/api/sheet-data/' + row + '/status', {
          method: 'PATCH',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ status })
        });
      } catch (err) {
        console.error(err);
      }
    });

    // Hamburger
    document.getElementById('hamburger').addEventListener('click', () => {
      document.getElementById('sidebar').classList.toggle('open');
    });

    // Logout
    document.getElementById('logoutLink').addEventListener('click', async (e) => {
      e.preventDefault();
      await fetch('/api/logout', { method: 'POST' });
      window.location.href = 'index.html';
    });

    async function loadSheetData() {
      try {
        const res = await fetch('/api/sheet-data');
        const data = await res.json();
        document.getElementById('sheetSyncInfo').textContent = data.lastSync ? 'Last sync: ' + new Date(data.lastSync + 'Z').toLocaleTimeString() : '';
        const tbody = document.getElementById('sheetTableBody');
        if (!data.entries.length) {
          tbody.innerHTML = '<tr><td colspan="11" style="text-align:center;padding:20px;color:var(--text-secondary)">No sheet data found</td></tr>';
          return;
        }
        const statuses = ['New', 'Contacted', 'Demo Done', 'Demo Rescheduled', 'Demo Cancelled', 'Demo Not Done', 'Converted', 'Not Interested'];
        tbody.innerHTML = data.entries.map(e => `
          <tr>
            <td><strong>${e.student_name || '-'}</strong></td>
            <td>${e.age || '-'}</td>
            <td>${e.language || '-'}</td>
            <td>${e.slot || '-'}</td>
            <td><span class="status-badge ${e.demo_status.toLowerCase().includes('done') ? 'Converted' : 'New'}">${e.demo_status}</span></td>
            <td><select class="sheet-status-select" data-row="${e.row}" style="padding:4px 8px;border:1px solid var(--border);border-radius:var(--radius-sm);font-size:0.8rem;background:var(--surface);color:var(--text)">${statuses.map(s => `<option value="${s}" ${s === e.status ? 'selected' : ''}>${s}</option>`).join('')}</select></td>
            <td>${e.date || '-'}</td>
            <td>${e.time || '-'}</td>
            <td>${e.tutor_name || '-'}</td>
            <td>${e.agent_name || '-'}</td>
            <td>${e.phone || '-'}</td>
          </tr>
        `).join('');
      } catch (err) {
        console.error('Failed to load sheet data', err);
      }
    }

    loadSheetData();
    setInterval(loadSheetData, 30000);
  </script>
</body>
</html>
